services:

  # IBM Quantum Connector – Spring Boot app connecting to Camunda SaaS
  # Credentials are read from src/main/resources/application.properties at runtime.
  ibmq-connector:
    build: ../..
    volumes:
      - ../../src/main/resources/application.properties:/app/config/application.properties:ro
    environment:
      SPRING_CONFIG_LOCATION: "file:/app/config/,classpath:/"
    depends_on:
      quantum-sidecar:
        condition: service_healthy
    restart: on-failure

  # Quantum Algorithm Sidecar – Flask service for circuit generation and result processing
  # For Grover: no additional dependencies.
  # For QAOA: start with --profile qaoa to also bring up the circuit generator and objective evaluator.
  quantum-sidecar:
    build: ./sidecar
    ports:
      - "5000:5000"
    environment:
      CIRCUIT_GENERATOR_URL: "http://quantum-circuit-generator:5073"
      OBJECTIVE_EVAL_URL: "http://objective-evaluation-service:5072"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # QAOA only – circuit generation backend (https://github.com/UST-QuAntiL/quantum-circuit-generator)
  quantum-circuit-generator:
    image: planqk/quantum-circuit-generator:latest
    ports:
      - "5073:5073"
    profiles: ["qaoa"]

  # QAOA only – objective evaluation backend (https://github.com/UST-QuAntiL/objective-evaluation-service)
  objective-evaluation-service:
    image: planqk/objective-evaluation-service:latest
    ports:
      - "5072:5072"
    profiles: ["qaoa"]
