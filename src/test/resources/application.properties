# Placeholder Camunda connection properties for tests.
# @CamundaSpringProcessTest overrides gRPC/REST addresses with the actual test container at runtime.
# Auth credentials are intentionally omitted: the embedded test engine does not use OAuth,
# and setting client-id/client-secret causes the 8.9.x credentials provider to perform
# OIDC discovery against a real endpoint during context startup.
camunda.client.grpc-address=grpc://localhost:26500
camunda.client.rest-address=http://localhost:8080
