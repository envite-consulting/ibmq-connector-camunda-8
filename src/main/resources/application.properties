# Camunda 8 connection (Zeebe / Operate / Tasklist)
camunda.client.grpc-address=https://YOUR_ZEEBE_ADDRESS
camunda.client.rest-address=https://YOUR_ZEEBE_REST_ADDRESS
camunda.client.auth.client-id=YOUR_CLIENT_ID
camunda.client.auth.client-secret=YOUR_CLIENT_SECRET
camunda.client.cloud.cluster-id=YOUR_CLUSTER_ID
camunda.client.cloud.region=YOUR_CLOUD_REGION

# Spring application name
spring.application.name=ibmq-connector

# Logging
logging.level.de.envite.connector.ibmq=DEBUG

# Set to true to automatically deploy the example workflow and forms on startup.
# Disable in production environments.
ibmq.example.deploy=false