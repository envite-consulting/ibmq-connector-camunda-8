# Camunda 8 connection – set these via environment variables (see .env.example)
camunda.client.grpc-address=${CAMUNDA_GRPC_ADDRESS}
camunda.client.rest-address=${CAMUNDA_REST_ADDRESS}
camunda.client.auth.client-id=${CAMUNDA_CLIENT_ID}
camunda.client.auth.client-secret=${CAMUNDA_CLIENT_SECRET}
camunda.client.cloud.cluster-id=${CAMUNDA_CLUSTER_ID}
camunda.client.cloud.region=${CAMUNDA_REGION}


# Spring application name
spring.application.name=ibmq-connector

# Logging
logging.level.de.envite.connector.ibmq=DEBUG
logging.level.io.camunda.client.job.poller=ERROR
logging.level.io.camunda.client.api=ERROR

# gRPC keepalive – sends a ping every 30 s so dead connections are detected
# quickly and the Zeebe client reconnects before job workers stall.
camunda.client.keep-alive=PT30S

# Actuator – expose the health endpoint for Docker liveness probes.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Set to true to automatically deploy the example workflow and forms on startup.
# Disable in production environments.
ibmq.example.deploy=false

# Set to true to utilize Camunda SaaS Connector Secrets
# For example, to pass the IBMQ_API_KEY stored as a Connector Secret via {{secrets.IBMQ_API_KEY}} in the IBMQ API Key field.
camunda.connector.secretprovider.console.enabled = true